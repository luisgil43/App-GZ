{% load static %}
<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <title>Seleccionar Rol</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <style>
    * { box-sizing: border-box; }

    html, body {
      margin: 0;
      padding: 0;
      min-height: 100vh;
      font-family: "Segoe UI", sans-serif;
    }

    body {
      background: linear-gradient(135deg, #f4f6f9 0%, #eef1f6 100%);
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 24px;
    }

    .role-shell {
      width: 100%;
      max-width: 410px;
    }

    .role-card {
      background: rgba(255, 255, 255, 0.96);
      border-radius: 24px;
      border: 1px solid rgba(0,0,0,0.05);
      box-shadow:
        0 22px 50px rgba(0,0,0,0.12),
        0 8px 18px rgba(0,0,0,0.06);
      overflow: hidden;
      animation: fadeUp .35s ease;
    }

    .role-header {
      background: linear-gradient(90deg, #f6a623 0%, #ff7a45 52%, #ff5a47 100%);
      padding: 22px 24px;
      text-align: center;
    }

    .role-header h2 {
      margin: 0;
      color: #fff;
      font-size: 1.45rem;
      font-weight: 900;
      letter-spacing: .02em;
      text-transform: uppercase;
    }

    .role-body {
      padding: 28px 24px 24px;
      text-align: center;
    }

    .role-body p {
      margin: 0 0 22px;
      font-size: 1rem;
      color: #5f6673;
      font-weight: 600;
    }

    form {
      margin: 0;
    }

    .actions {
      display: flex;
      flex-direction: column;
      gap: 14px;
    }

    .btn-role {
      width: 100%;
      border: none;
      border-radius: 999px;
      padding: 14px 16px;
      font-size: 1rem;
      font-weight: 800;
      cursor: pointer;
      transition: transform .15s ease, box-shadow .2s ease, filter .2s ease;
    }

    .btn-role:hover {
      transform: translateY(-1px);
      filter: brightness(1.02);
    }

    .btn-user {
      color: #fff;
      background: linear-gradient(90deg, #ff4b4b 0%, #ff7445 48%, #f6b13a 100%);
      box-shadow:
        0 14px 28px rgba(255, 90, 71, 0.22),
        0 6px 14px rgba(0,0,0,0.08);
    }

    .btn-user:hover {
      box-shadow:
        0 18px 32px rgba(255, 90, 71, 0.28),
        0 10px 18px rgba(0,0,0,0.12);
    }

    .btn-admin {
      color: #fff;
      background: linear-gradient(90deg, #454d5b 0%, #596170 52%, #6b7280 100%);
      box-shadow:
        0 14px 28px rgba(69, 77, 91, 0.20),
        0 6px 14px rgba(0,0,0,0.08);
    }

    .btn-admin:hover {
      box-shadow:
        0 18px 32px rgba(69, 77, 91, 0.26),
        0 10px 18px rgba(0,0,0,0.12);
    }

    @keyframes fadeUp {
      from {
        opacity: 0;
        transform: translateY(16px);
      }
      to {
        opacity: 1;
        transform: translateY(0);
      }
    }

    @media (max-width: 520px) {
      body {
        padding: 18px;
      }

      .role-header {
        padding: 20px 18px;
      }

      .role-header h2 {
        font-size: 1.2rem;
      }

      .role-body {
        padding: 22px 18px 20px;
      }

      .btn-role {
        font-size: .96rem;
        padding: 13px 14px;
      }
    }
  </style>
</head>
<body>

  <div class="role-shell">
    <div class="role-card">
      <div class="role-header">
        <h2>Seleccionar acceso</h2>
      </div>

      <div class="role-body">
        <p>¿Cómo deseas ingresar?</p>

        <form method="post">
          {% csrf_token %}
          <div class="actions">

            {% if can_user %}
            <button type="submit" name="opcion" value="usuario" class="btn-role btn-user">
              Entrar como Usuario
            </button>
            {% endif %}

            {% if can_admin %}
            <button type="submit" name="opcion" value="admin" class="btn-role btn-admin">
              Entrar como Administrador
            </button>
            {% endif %}

          </div>
        </form>
      </div>
    </div>
  </div>

</body>
</html>
